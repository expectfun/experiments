  new THREE.MeshBasicMaterial({ color: 0xffdd88 })

  const s = new THREE.Mesh(new THREE.SphereGeometry(500,16,16), new THREE.MeshBasicMaterial({color:0xffdd88}));
  s.position.copy(sunLight.position);
  scene.add(s);
  return s;
})());

// ─── Text sprite helper ───
function createLabel(text, position, opts = {}) {
  const { fontSize = 48, color = '#ffffff', bgColor = null, scale = 1 } = opts;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = `bold ${fontSize}px Segoe UI, sans-serif`;
  const tw = ctx.measureText(text).width;
  const pad = 16;
  canvas.width = tw + pad * 2;
  canvas.height = fontSize * 1.4 + pad * 2;

  if (bgColor) {
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.roundRect(0, 0, canvas.width, canvas.height, 8);
    ctx.fill();
  }

  ctx.font = `bold ${fontSize}px Segoe UI, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 6;
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);

  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sprite.position.copy(position);
  const aspect = canvas.width / canvas.height;
  const h = 800 * scale;
  sprite.scale.set(h * aspect, h, 1);
  return sprite;
}

// ─── Marker helper ───
function createMarker(label, x3d, z3d, elevM, opts = {}) {
  const { color = 0xff4444, pinHeight = 3000 } = opts;
  const group = new THREE.Group();
  const y = (elevM - H_OFFSET) * VERT_EXAG;

  const pts = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, pinHeight, 0)];
  group.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.8 })
  ));

  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(120, 12, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  dot.position.y = pinHeight;
  group.add(dot);

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(150, 220, 24),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
  );
  ring.position.y = pinHeight;
  ring.rotation.x = -Math.PI / 2;
  group.add(ring);

  group.add(createLabel(label, new THREE.Vector3(0, pinHeight + 600, 0), {
    color: '#ffffff', scale: 1, bgColor: 'rgba(0,0,0,0.5)'
  }));

  group.position.set(x3d, y, z3d);
  return { group, ring, dot };
}

// ─── Load heightmap ───

async function loadHeightmap() {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = H_SIZE; canvas.height = H_SIZE;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imgData = ctx.getImageData(0, 0, H_SIZE, H_SIZE);
      const heights = new Float32Array(H_SIZE * H_SIZE);
      for (let i = 0; i < H_SIZE * H_SIZE; i++) {
        heights[i] = imgData.data[i*4] * 256 + imgData.data[i*4+1] + H_OFFSET;
      }
      resolve(heights);
    };
    img.src = 'data:image/png;base64,' + heightmapB64;
  });
}

function getTerrainColor(elev, slope) {
  let color;
  if (elev >= 4500) {
    const t = Math.min((elev - 4500) / 500, 1);
    color = new THREE.Color(0xffffff).lerp(new THREE.Color(0xc8daf0), t * 0.3);
  } else if (elev >= 4200) {
    color = new THREE.Color(0xd8d0c0).lerp(new THREE.Color(0xffffff), (elev - 4200) / 300);
  } else if (elev >= 3200) {
    const t = (elev - 3200) / 1000;
    color = new THREE.Color(0x7a6b5a).lerp(new THREE.Color(0xa09080), t);
    if (t > 0.7) color.lerp(new THREE.Color(0xd0c8b8), (t - 0.7) * 2);
  } else if (elev >= 2400) {
    color = new THREE.Color(0x5a7a40).lerp(new THREE.Color(0x7a6b5a), (elev - 2400) / 800);
  } else if (elev >= 1500) {
    color = new THREE.Color(0x3d6030).lerp(new THREE.Color(0x5a7a40), (elev - 1500) / 900);
  } else {
    color = new THREE.Color(0x6a8040).lerp(new THREE.Color(0x3d6030), Math.max(0, (elev - 800) / 700));
  }
  if (slope > 0.5 && elev > 2200) {
    color.lerp(new THREE.Color(0x6a5a4a), Math.min((slope - 0.5) / 0.5, 1) * 0.4);
  }
  return color;
}

async function buildTerrain() {
  const heights = await loadHeightmap();

  const geo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, H_SIZE - 1, H_SIZE - 1);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const h = heights[i] !== undefined ? heights[i] : H_OFFSET;
    pos.setY(i, (h - H_OFFSET) * VERT_EXAG);
  }

  geo.computeVertexNormals();
  const normals = geo.attributes.normal;
  const colors = new Float32Array(pos.count * 3);

  for (let i = 0; i < pos.count; i++) {
    const h = heights[i] !== undefined ? heights[i] : H_OFFSET;
    const slope = 1 - normals.getY(i);
    const color = getTerrainColor(h, slope);
    const x = pos.getX(i), z = pos.getZ(i);
    const nv = (Math.sin(x * 0.0003 + z * 0.0007) * 0.5 + 0.5) * 0.06 - 0.03;
    colors[i*3]   = Math.max(0, Math.min(1, color.r + nv));
    colors[i*3+1] = Math.max(0, Math.min(1, color.g + nv));
    colors[i*3+2] = Math.max(0, Math.min(1, color.b + nv * 0.5));
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.85, metalness: 0.02,
  }));
  mesh.receiveShadow = true;
  mesh.castShadow = true;
  scene.add(mesh);

  // Sample elevation at a given 3D position
  function sampleElev(x3d, z3d) {
    const px = Math.round((x3d / TERRAIN_SIZE + 0.5) * (H_SIZE - 1));
    const pz = Math.round((z3d / TERRAIN_SIZE + 0.5) * (H_SIZE - 1));
    if (px < 0 || px >= H_SIZE || pz < 0 || pz >= H_SIZE) return H_OFFSET;
    return heights[pz * H_SIZE + px];
  }

  const peakElev = sampleElev(PEAK_X, PEAK_Z);
  const lesserElev = sampleElev(LESSER_X, LESSER_Z);
  console.log(`Greater Ararat: ${peakElev.toFixed(0)}m, Lesser Ararat: ${lesserElev.toFixed(0)}m`);

  // ─── Peak markers ───
  const greaterMarker = createMarker(
    'Greater Ararat · 5,137 m', PEAK_X, PEAK_Z, peakElev,
    { color: 0xff6644, pinHeight: 2500 }
  );
  scene.add(greaterMarker.group);

  const lesserMarker = createMarker(
    'Lesser Ararat · 3,896 m', LESSER_X, LESSER_Z, lesserElev,
    { color: 0xffaa44, pinHeight: 2000 }
  );
  scene.add(lesserMarker.group);

  // ─── Yerevan marker (NNW, 72 km, outside terrain) ───
  const yerevanGroup = new THREE.Group();
  const yerevanY = 1000;

  const poleGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, -2000, 0),
    new THREE.Vector3(0, 3000, 0)
  ]);
  yerevanGroup.add(new THREE.Line(poleGeo, new THREE.LineBasicMaterial({
    color: 0x44aaff, transparent: true, opacity: 0.7
  })));

  const yDot = new THREE.Mesh(
    new THREE.SphereGeometry(150, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0x44aaff })
  );
  yDot.position.y = 3000;
  yerevanGroup.add(yDot);

  const yRing = new THREE.Mesh(
    new THREE.RingGeometry(200, 280, 24),
    new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
  );
  yRing.position.y = 3000;
  yRing.rotation.x = -Math.PI / 2;
  yerevanGroup.add(yRing);

  yerevanGroup.add(createLabel(
    'YEREVAN · 1,100 m · 72 km NNW',
    new THREE.Vector3(0, 3800, 0),
    { color: '#88ccff', scale: 1.0, bgColor: 'rgba(0,0,40,0.6)' }
  ));
  yerevanGroup.position.set(YEREVAN_X, yerevanY, YEREVAN_Z);
  scene.add(yerevanGroup);

  // ─── Dashed line Ararat → Yerevan ───
  const dashGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(PEAK_X, (peakElev - H_OFFSET) * VERT_EXAG + 2500, PEAK_Z),
    new THREE.Vector3(YEREVAN_X, yerevanY + 3000, YEREVAN_Z)
  ]);
  const dashLine = new THREE.Line(dashGeo, new THREE.LineDashedMaterial({
    color: 0x88bbff, dashSize: 500, gapSize: 300, transparent: true, opacity: 0.4
  }));
  dashLine.computeLineDistances();
  scene.add(dashLine);

  // Distance label at midpoint
  const midX = (PEAK_X + YEREVAN_X) / 2;
  const midY = ((peakElev - H_OFFSET) * VERT_EXAG + 2500 + yerevanY + 3000) / 2;
  const midZ = (PEAK_Z + YEREVAN_Z) / 2;
  scene.add(createLabel('~72 km', new THREE.Vector3(midX, midY, midZ), {
    color: '#88bbff', scale: 0.8
  }));

  // ─── Compass ───
  const compassG = new THREE.Group();
  const aLen = 4000;
  compassG.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, -aLen), new THREE.Vector3(0, 0, aLen)
    ]),
    new THREE.LineBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.3 })
  ));
  compassG.add(createLabel('N', new THREE.Vector3(0, 0, -aLen - 800), { color: '#ff6666', scale: 0.7 }));
  compassG.add(createLabel('S', new THREE.Vector3(0, 0, aLen + 800), { color: '#ffffff', scale: 0.5 }));
  // East-West
  compassG.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-aLen*0.6, 0, 0), new THREE.Vector3(aLen*0.6, 0, 0)
    ]),
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 })
  ));
  compassG.add(createLabel('E', new THREE.Vector3(aLen*0.6 + 800, 0, 0), { color: '#ffffff', scale: 0.5 }));
  compassG.add(createLabel('W', new THREE.Vector3(-aLen*0.6 - 800, 0, 0), { color: '#ffffff', scale: 0.5 }));
  compassG.position.set(0, 500, 0);
  scene.add(compassG);

  document.getElementById('loading').style.display = 'none';

  return {
    mesh,
    animated: [greaterMarker, lesserMarker, { ring: yRing, dot: yDot }]
  };
}

// ─── Clouds ───
const cloudList = [];
for (let i = 0; i < 10; i++) {
  const g = new THREE.Group();
  const cm = new THREE.MeshStandardMaterial({
    color: 0xffeedd, transparent: true, opacity: 0.2, roughness: 1, depthWrite: false,
  });
  for (let j = 0; j < 6 + Math.floor(Math.random() * 5); j++) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(30 + Math.random()*50, 8, 6), cm);
    p.position.set((Math.random()-.5)*150, (Math.random()-.5)*30, (Math.random()-.5)*80);
    p.scale.y = 0.4;
    g.add(p);
  }
  g.position.set((Math.random()-.5)*50000, 12000+Math.random()*5000, (Math.random()-.5)*50000);
  g.scale.setScalar(1 + Math.random()*1.5);
  scene.add(g);
  cloudList.push(g);
}

// ─── Snow ───
const SNOW = 4000;
const snowGeo = new THREE.BufferGeometry();
const snowP = new Float32Array(SNOW * 3);
const snowV = [];
for (let i = 0; i < SNOW; i++) {
  snowP[i*3] = (Math.random()-.5)*30000;
  snowP[i*3+1] = Math.random()*20000+5000;
  snowP[i*3+2] = (Math.random()-.5)*30000;
  snowV.push({ x:(Math.random()-.5)*2, y:-Math.random()*3-1, z:(Math.random()-.5)*2 });
}
snowGeo.setAttribute('position', new THREE.BufferAttribute(snowP, 3));
scene.add(new THREE.Points(snowGeo, new THREE.PointsMaterial({
  color: 0xffffff, size: 15, transparent: true, opacity: 0.5, depthWrite: false,
})));

// ─── Build & Animate ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const elevDisp = document.getElementById('elevation-display');

buildTerrain().then(({ mesh: terrain, animated }) => {
  renderer.domElement.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(terrain);
    if (hits.length > 0) {
      const realElev = hits[0].point.y / VERT_EXAG + H_OFFSET;
      elevDisp.style.opacity = '1';
      elevDisp.innerHTML = `Elevation: <strong>${realElev.toFixed(0)} m</strong>`;
    } else {
      elevDisp.style.opacity = '0';
    }
  });

  const clock = new THREE.Clock();
  (function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Pulse markers
    animated.forEach((obj, i) => {
      const s = 1 + Math.sin(t * 2 + i) * 0.15;
      obj.ring.scale.set(s, s, 1);
      obj.ring.material.opacity = 0.3 + Math.sin(t * 2 + i) * 0.15;
    });

    // Snow
    const sp = snowGeo.attributes.position;
    for (let i = 0; i < SNOW; i++) {
      let x = sp.getX(i) + snowV[i].x;
      let y = sp.getY(i) + snowV[i].y;
      let z = sp.getZ(i) + snowV[i].z;
      if (y < 1000) {
        x = (Math.random()-.5)*30000;
        y = 20000+Math.random()*5000;
        z = (Math.random()-.5)*30000;
      }
      sp.setXYZ(i, x, y, z);
    }
    sp.needsUpdate = true;

    cloudList.forEach((c, i) => {
      c.position.x += Math.sin(t * 0.02 + i) * 2;
      c.position.z += Math.cos(t * 0.015 + i * 0.7) * 1.5;
    });

    controls.update();
    renderer.render(scene, camera);
  })();
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
